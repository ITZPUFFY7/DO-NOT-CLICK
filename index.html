<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DO NOT CLICK</title>

    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
        }

        button {
            font-size: 22px;
            padding: 15px 30px;
            cursor: pointer;
            margin-top: 50px;
        }

        #jumpscare {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>

<body>

<h1>⚠️ DO NOT CLICK ⚠️</h1>

<button id="dangerButton">DO NOT CLICK</button>

<img id="jumpscare" src="" alt="jumpscare">

<script>
const images = [
    "https://tse3.mm.bing.net/th/id/OIP.4TXYxArNbw4Gr82eUUL_bwHaJ6?rs=1&pid=ImgDetMain&o=7&rm=3",
    "https://www.boredpanda.com/blog/wp-content/uploads/2023/04/644a230e3f5d4_l7ink8py2vta1__700.jpg"
];

document.getElementById("dangerButton").addEventListener("click", function() {
    const randomIndex = Math.floor(Math.random() * 2); // 0 or 1
    const img = document.getElementById("jumpscare");

    img.src = images[randomIndex];
    img.style.display = "block";
});
</script>

</body>
</html>
